# ~/.config/starship.toml
# Unified config for macOS, Raspberry Pi, and DreamHost
# Last Updated 2025-10-11 by Derek G. Weber

# Timeout for commands (default 500ms can be slow on some systems)
command_timeout = 1000

# Format - what shows in your prompt and in what order
format = """
[┌─](bold green)$username$hostname$directory$git_branch$git_status$python$docker_context$aws
[└─>](bold green) """

# Right side prompt (optional)
right_format = """$env_var $time"""

[env_var.STARSHIP_DATE]
format = "[$env_value]($style) "
style = "bold white"
variable = "STARSHIP_DATE"
default = ""

# Username module - shows user@
[username]
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style)@"
disabled = false
show_always = true

# Hostname module
[hostname]
ssh_only = false
format = "[$hostname](bold yellow) "
trim_at = "."
disabled = false

[directory]
truncation_length = 3
truncate_to_repo = true  # Don't show full path when in git repo
style = "bold cyan"
read_only = " 🔒"

[git_branch]
symbol = " "
style = "bold purple"
truncation_length = 20

[git_status]
style = "bold red"
conflicted = "⚔️ "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "📦"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[python]
symbol = "🐍 "
style = "yellow bold"
format = 'via [$symbol$version]($style) '
# Only show when in a Python project
detect_extensions = ['py']
detect_files = ['.python-version', 'Pipfile', 'pyproject.toml', 'requirements.txt', 'setup.py']

[time]
disabled = false
format = '[$time]($style) '
style = "bold white"
time_format = "%T"

[cmd_duration]
min_time = 2000  # Only show if command took longer than 2 seconds
format = "took [$duration]($style) "
style = "bold yellow"

# Character that shows when previous command failed
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[status]
disabled = false
format = '[\[$status\]]($style) '

# Docker context (useful on Mac and Raspberry Pi)
[docker_context]
symbol = "🐳 "
style = "bold blue"
format = "via [$symbol$context]($style) "
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

# AWS (if you use it)
[aws]
symbol = "☁️  "
style = "bold yellow"
format = 'on [$symbol($profile )($region)]($style) '
disabled = false

